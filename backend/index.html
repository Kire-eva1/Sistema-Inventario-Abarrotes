<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Abarrotes - Inventario Pro</title>

<style>

body 
{
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #f0f2f5;
    padding: 20px;
    color:#333;
}


.container 
{
    display:flex;
    gap:30px;
    max-width:1400px;
    margin:auto;
}


.box 
{
    background:white;
    padding:25px;
    border-radius:12px;
    width:50%;
    box-shadow:0 4px 15px rgba(0,0,0,.08);
}


h1,h2 {color:#1a73e8;}
label 
{
    display:block;
    margin-top:12px;
    font-size:13px;
    font-weight:bold;
}

input,select,button 
{
    width:100%; padding:10px; 
    margin-top:5px;
    border:1px solid #ddd;
    border-radius:6px;
    box-sizing:border-box;
}

button 
{
    background:#28a745;
    color:white;
    border:none;
    cursor:pointer;
    font-weight:bold;
    margin-top:20px;
}

button:hover {opacity:.9;}

.grid-form 
{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}


.full-width {grid-column:span 2;}

.btn-logout {background:#dc3545; width:auto;}


table 
{
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
}


th,td 
{
    border-bottom:1px solid #eee;
    padding:10px;
}


th 
{
    background:#f8f9fa;
}


.alerta 
{
    padding:12px;
    margin-top:8px;
    border-radius:8px;
}


#login-section 
{
    max-width:400px;
    margin:100px auto;
}


#main-content 
{
    display:none;
}


</style>
</head>
<body>



<!-- LOGIN -->

<div id="login-section" class="box">
<h2>Acceso al Sistema</h2>
<input id="login-usuario" placeholder="Usuario">
<input 
id="login-password"
type="password"
placeholder="Contraseña">
<button onclick="login()"> Ingresar </button>
</div>


<!-- SISTEMA -->

<div id="main-content">
<div style="display:flex;justify-content:space-between;align-items:center;">
<h1>Inventario de Abarrotes</h1>
<div>
<button 
style="background:#007bff;width:auto"
onclick="toggleUsuarios()">
+ Usuario 
</button>


<button 
class="btn-logout"
onclick="logout()">
Salir
</button>
</div>
</div>
<div class="container">



<!-- PRODUCTOS -->

<div class="box">
<h2>Registro Producto</h2>
<div class="grid-form">
<div class="full-width">
<label>

Nombre *

</label>
<input id="nombre">
</div>




<div>
<label>
Categoría *
</label>
<select id="categoria">

<option value="">

Seleccione...

</option>
</select>
</div>




<div>
<label>
Marca
</label>
<input id="marca">
</div>

<div>
<label>
Código barras
</label>

<input id="codigo_barras">
</div>


<div>
<label>
SKU
</label>
<input id="sku">
</div>


<div>
<label>
Proveedor ID
</label>

<input id="proveedor_id" value="1">
</div>


<div>
<label>
Documento
</label>

<input id="numero_documento">
</div>


<div>
<label>
Fecha elaboración
</label>

<input type="date" id="fecha_elaboracion">
</div>


<div>
<label>
Fecha vencimiento *
</label>

<input type="date" id="fecha">
</div>


<div>
<label>
Cantidad
</label>

<input type="number" id="cantidad" value="0">
</div>


<div>
<label>
Stock mínimo
</label>

<input type="number" id="stock" value="0">
</div>


<div>
<label>
Precio costo
</label>

<input type="number" id="precio_costo" value="0">
</div>


<div>
<label>
Precio venta
</label>

<input type="number" id="precio_venta" value="0">
</div>

</div>


<button onclick="guardar()">
Guardar Producto
</button>
</div>



<!-- LISTADO -->
<div class="box">
<h2>
Productos
</h2>

<table>
<thead>
<tr>
<th>
Producto
</th>

<th>
Categoría
</th>

<th>
Vence
</th>

<th>
Stock
</th>

</tr>

</thead>
<tbody id="tabla"> </tbody>

</table>
<h2>
Alertas
</h2>

<button 
style="background:#17a2b8"
onclick="imprimirAlertas()">

Imprimir Alertas

</button>
<div id="alertas">
</div>
</div>
</div>
</div>

<!-- PANEL USUARIOS -->

<div id="panel-usuarios" style="display:none;" class="container">
<div class="box">
<h2>
Crear Usuario
</h2>
<div class="grid-form">
<div>

<label>
Usuario
</label>
<input id="nuevoUsuario">
</div>

<div>
<label>
RUT
</label>
<input 
id="nuevoRut"
placeholder="11.111.111-1">
</div>


<div>
<label>
Correo
</label>

<input id="nuevoCorreo" type="email">
</div>



<div>
<label>
Contraseña
</label>
<input id="nuevoPassword" type="password">
</div>

<div>
<label>
Rol
</label>
<select id="nuevoRol">

<option value="1">
Administrador
</option>

<option value="2">
Vendedor
</option>

<option value="3">
Bodega
</option>

</select>
</div>


</div>
<button onclick="crearUsuario()">
Guardar Usuario
</button>
</div>


</div>
<script>

const API_URL = "http://localhost:3000";

let token = localStorage.getItem("token");




// ================= INICIO =================


if(token){

    mostrarApp();

}






// ================= LOGIN =================


async function login(){


    const usuario =
    document.getElementById("login-usuario").value;


    const password =
    document.getElementById("login-password").value;



    try{


        const response = await fetch(
            `${API_URL}/auth/login`,
            {

                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                body:JSON.stringify({
                    usuario,
                    password
                })

            }
        );



        const data = await response.json();



        if(!response.ok || !data.success){

            throw new Error(
                data.message || "Credenciales incorrectas"
            );

        }



        token = data.token;


        localStorage.setItem(
            "token",
            token
        );
        mostrarApp();

    }
    catch(error)

    { 
        alert(error.message);


    }


}



// ================= MOSTRAR APP =================


function mostrarApp()
{

    document.getElementById(
        "login-section"
    ).style.display="none";


    document.getElementById(
        "main-content"
    ).style.display="block";

    cargarCategorias();

    cargarProductos();

    cargarAlertas();


}







// ================= LOGOUT =================


function logout()
{
    localStorage.removeItem("token");
    location.reload();
}




// ================= FETCH API =================


async function apiFetch(endpoint, options={})
{
    if(!options.headers)
    {
        options.headers={};
    }

    options.headers.Authorization =
        `Bearer ${token}`;

    const response =
        await fetch(
            `${API_URL}${endpoint}`,
            options
        );


    if(response.status===401)
    {
        logout();
    }

    return response;
}





// ================= USUARIOS =================


function toggleUsuarios()
{
    const panel =
    document.getElementById
    ("panel-usuarios"); panel.style.display = panel.style.display==="none"?"flex":"none";
}

async function crearUsuario()
{
    console.log("Entró a crearUsuario()");
    const body = 
    {
    rut: document.getElementById("nuevoRut").value,
    usuario: document.getElementById("nuevoUsuario").value,
    correo: document.getElementById("nuevoCorreo").value,
    password: document.getElementById("nuevoPassword").value,
    rol_id: parseInt(document.getElementById("nuevoRol").value)
};

    if (!body.usuario || !body.correo || !body.password)
    {
        alert("Complete todos los campos.");
        return;
    }

    try{
        const response = await apiFetch
        (
            "/usuarios",
            {
                method:"POST", headers:
                {
                 "Content-Type":"application/json"
                },

                body:JSON.stringify(body)
            }
        );
       
const data = await response.json();

if (response.ok) {

    alert(data.mensaje || "Usuario creado correctamente");

    document.getElementById("nuevoUsuario").value = "";
    document.getElementById("nuevoPassword").value = "";
    document.getElementById("nuevoCorreo").value = "";
    document.getElementById("nuevoRol").value = "2";

} else {

    alert(data.error || data.message || "Error al crear usuario");

}



    }
    catch(error)
    {
        console.error(error); alert("Error al crear usuario");
    }
}




// ================= CATEGORIAS =================


async function cargarCategorias(){



    const response =
    await apiFetch(
        "/categorias"
    );



    const resultado =
    await response.json();



    const categorias =
    resultado.data || [];



    const select =
    document.getElementById(
        "categoria"
    );



    select.innerHTML =
    `
    <option value="">
    Seleccione...
    </option>
    `;



    categorias.forEach(c=>{


        select.innerHTML +=
        `
        <option value="${c.id}">
        ${c.nombre}
        </option>
        `;


    });


}









// ================= PRODUCTOS =================


async function guardar(){


    const producto={


        nombre:
        document.getElementById("nombre").value,


        categoria_id:
        document.getElementById("categoria").value,


        proveedor_id:
        document.getElementById("proveedor_id").value,


        fecha_vencimiento:
        document.getElementById("fecha").value,


        fecha_elaboracion:
        document.getElementById("fecha_elaboracion").value,


        cantidad:
        Number(
            document.getElementById("cantidad").value
        ),


        stock_minimo:
        Number(
            document.getElementById("stock").value
        ),


        stock_actual:
        Number(
            document.getElementById("cantidad").value
        ),


        codigo_barras:
        document.getElementById("codigo_barras").value,


        marca:
        document.getElementById("marca").value,


        sku:
        document.getElementById("sku").value,


        numero_documento:
        document.getElementById("numero_documento").value,


        precio_costo:
        Number(
            document.getElementById("precio_costo").value
        ),


        precio_venta:
        Number(
            document.getElementById("precio_venta").value
        )


    };





    if(
        !producto.nombre ||
        !producto.categoria_id ||
        !producto.fecha_vencimiento
    ){


        alert(
            "Complete los campos obligatorios"
        );


        return;


    }






    const response =
    await apiFetch(
        "/productos",
        {


            method:"POST",


            headers:{
                "Content-Type":"application/json"
            },


            body:JSON.stringify(producto)



        }
    );



    const data =
    await response.json();




    if(data.success){


        alert(
            "Producto guardado"
        );


        cargarProductos();

        cargarAlertas();


    }else{


        alert(
            data.message
        );


    }


}









async function cargarProductos(){


    const response =
    await apiFetch(
        "/productos"
    );



    const resultado =
    await response.json();



    const productos =
    resultado.data || [];



    const tabla =
    document.getElementById(
        "tabla"
    );



    tabla.innerHTML="";



    productos.forEach(p=>{


        tabla.innerHTML +=

        `

        <tr>

        <td>
        ${p.nombre}
        </td>


        <td>
        ${p.categoria || ""}
        </td>


        <td>
        ${
            p.fecha_vencimiento
            ?
            p.fecha_vencimiento.substring(0,10)
            :
            ""
        }
        </td>


        <td>
        ${p.cantidad}
        </td>


        </tr>

        `;


    });



}






// ================= ALERTAS =================


async function cargarAlertas(){


    const response =
    await apiFetch(
        "/alertas"
    );



    const data =
    await response.json();



    const alertas =
    data.data || data || [];



    const div =
    document.getElementById(
        "alertas"
    );



    div.innerHTML="";



    alertas.forEach(p=>{


        div.innerHTML +=

        `

        <div class="alerta"
        style="background:#fff3cd">

        ⚠ ${p.nombre}
        vence
        ${
            p.fecha_vencimiento
            ?
            p.fecha_vencimiento.substring(0,10)
            :
            ""
        }

        </div>

        `;


    });


}









// ================= IMPRESION =================


async function imprimirAlertas(){


    const response =
    await apiFetch(
        "/alertas"
    );



    const data =
    await response.json();



    const alertas =
    data.data || data || [];



    if(!alertas.length){

        alert(
            "No existen alertas"
        );

        return;

    }



    const ventana =
    window.open("");



    ventana.document.write(

    `

    <h1>
    Reporte de Alertas
    </h1>


    <table border="1">

    <tr>

    <th>
    Producto
    </th>

    <th>
    Vencimiento
    </th>

    </tr>


    ${
        alertas.map(p=>

        `

        <tr>

        <td>
        ${p.nombre}
        </td>


        <td>
        ${
            p.fecha_vencimiento
            ?
            p.fecha_vencimiento.substring(0,10)
            :
            ""
        }
        </td>


        </tr>

        `

        ).join("")
    }


    </table>

    `);


    ventana.print();


}



</script>


</body>

</html>
