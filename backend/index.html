<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Abarrotes - Inventario Pro</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            padding: 20px;
            color: #333;
        }

        .container {
            display: flex;
            gap: 30px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .box {
            background: white;
            padding: 25px;
            border-radius: 12px;
            width: 50%;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        }

        h1,
        h2 {
            color: #1a73e8;
            margin-top: 0;
        }

        label {
            display: block;
            margin-top: 12px;
            font-size: 13px;
            font-weight: bold;
            color: #555;
        }

        input,
        select,
        button {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
        }

        .grid-form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .full-width {
            grid-column: span 2;
        }

        button {
            background: #28a745;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
            transition: 0.3s;
        }

        button:hover {
            background: #218838;
        }

        .btn-logout {
            background: #dc3545;
            width: auto;
            padding: 8px 20px;
            margin: 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 14px;
        }

        th,
        td {
            border-bottom: 1px solid #eee;
            padding: 12px;
            text-align: left;
        }

        th {
            background: #f8f9fa;
            color: #555;
            text-transform: uppercase;
            font-size: 12px;
        }

        .alerta {
            padding: 12px;
            margin-top: 8px;
            border-radius: 8px;
            font-size: 13px;
        }

        #login-section {
            max-width: 400px;
            margin: 100px auto;
            text-align: center;
        }

        #main-content {
            display: none;
        }
    </style>
</head>

<body>

    <!-- LOGIN -->
    <div id="login-section" class="box">
        <h2>Acceso al Sistema</h2>

        <input id="login-usuario" placeholder="Usuario">

        <input id="login-password"
               type="password"
               placeholder="Contraseña">

        <button onclick="login()">
            Iniciar Sesión
        </button>
    </div>

    <!-- CONTENIDO PRINCIPAL -->
    <div id="main-content">

        <!-- ENCABEZADO -->
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">

            <div style="display:flex; gap:10px; align-items:center;">
                <h1>Inventario de Abarrotes</h1>

                <button
                    style="width:auto; padding:10px 15px; background:#007bff;"
                    onclick="toggleUsuarios()">

                    + Crear Usuario
                </button>
            </div>

            <button class="btn-logout"
                    onclick="logout()">

                Cerrar Sesión
            </button>
        </div>

        <!-- CONTENEDOR -->
        <div class="container">

            <!-- FORMULARIO PRODUCTOS -->
            <div class="box">

                <h2>Registro de Producto</h2>

                <div class="grid-form">

                    <div class="full-width">
                        <label>Nombre del Producto *</label>

                        <input id="nombre"
                               placeholder="Ej: Arroz 1kg">
                    </div>

                    <div>
                        <label>Categoría *</label>

                        <select id="categoria">
                            <option value="">Seleccione...</option>
                        </select>
                    </div>

                    <div>
                        <label>Marca</label>

                        <input id="marca"
                               placeholder="Marca">
                    </div>

                    <div>
                        <label>Código de Barras</label>

                        <input id="codigo_barras"
                               placeholder="EAN-13">
                    </div>

                    <div>
                        <label>SKU / Código Interno</label>

                        <input id="sku"
                               placeholder="SKU001">
                    </div>

                    <div>
                        <label>Proveedor</label>

                        <input id="proveedor"
                               placeholder="Nombre del proveedor">
                    </div>

                    <div>
                        <label>N° Factura / Guía</label>

                        <input id="numero_documento"
                               placeholder="001-000123">
                    </div>

                    <div>
                        <label>Fecha Elaboración</label>

                        <input type="date"
                               id="fecha_elaboracion">
                    </div>

                    <div>
                        <label>Fecha Vencimiento *</label>

                        <input type="date"
                               id="fecha">
                    </div>

                    <div>
                        <label>Stock Actual</label>

                        <input id="cantidad"
                               type="number"
                               value="0">
                    </div>

                    <div>
                        <label>Stock Mínimo</label>

                        <input id="stock"
                               type="number"
                               value="0">
                    </div>

                </div>

                <button onclick="guardar()">
                    GUARDAR PRODUCTO
                </button>

            </div>

            <!-- TABLA -->
            <div class="box">

                <h2>Productos en Stock</h2>

                <div style="overflow-x:auto;">

                    <table>

                        <thead>
                            <tr>
                                <th>Nombre</th>
                                <th>Categoría</th>
                                <th>Vence</th>
                                <th>Stock</th>
                            </tr>
                        </thead>

                        <tbody id="tabla"></tbody>

                    </table>

                </div>

                <h2 style="margin-top:30px;">
                    Alertas de Vencimiento
                </h2>

                <button
                    style="background:#17a2b8; margin-bottom:15px;"
                    onclick="imprimirAlertas()">

                    Imprimir Reporte de Alertas
                </button>

                <div id="alertas"></div>

            </div>

        </div>

    </div>

    <!-- PANEL USUARIOS -->
    <div id="panel-usuarios"
         class="container"
         style="margin-top:30px; display:none;">

        <div class="box">

            <h2>Crear Nuevo Usuario</h2>

            <div class="grid-form">

                <div>
                    <label>Usuario</label>

                    <input type="text"
                           id="nuevoUsuario"
                           placeholder="Ej: Lucas">
                </div>

                <div>
                    <label>Correo</label>

                    <input type="email"
                           id="nuevoCorreo"
                           placeholder="correo@correo.cl">
                </div>

                <div>
                    <label>Contraseña</label>

                    <input type="password"
                           id="nuevoPassword">
                </div>

                <div>
                    <label>Rol</label>

                    <select id="nuevoRol">
                        <option value="1">Administrador</option>
                        <option value="2">Vendedor</option>
                        <option value="3">Bodega</option>
                    </select>
                </div>

            </div>

            <button onclick="crearUsuario()">
                Guardar Usuario
            </button>

        </div>

    </div>

    <script>

        const API_URL = "http://localhost:3000";

        let token = localStorage.getItem('token');

        if (token) {
            mostrarApp();
        }

        // LOGIN
        async function login() {

            const usuario = document.getElementById("login-usuario").value;
            const password = document.getElementById("login-password").value;

            try {

                const res = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        usuario,
                        password
                    })
                });

                if (!res.ok) {
                    throw new Error("Credenciales incorrectas");
                }

                const data = await res.json();

                token = data.token;

                localStorage.setItem('token', token);

                mostrarApp();

            } catch (err) {

                alert(err.message);
            }
        }

        // MOSTRAR / OCULTAR PANEL USUARIOS
        function toggleUsuarios() {

            const panel = document.getElementById("panel-usuarios");

            if (panel.style.display === "none") {
                panel.style.display = "flex";
            } else {
                panel.style.display = "none";
            }
        }

        // LOGOUT
        function logout() {

            localStorage.removeItem('token');

            location.reload();
        }

        // MOSTRAR APP
        function mostrarApp() {

            document.getElementById("login-section").style.display = "none";

            document.getElementById("main-content").style.display = "block";

            cargarCategorias();
            cargarProductos();
            cargarAlertas();
        }

        // FETCH
        async function apiFetch(endpoint, options = {}) {

            if (!options.headers) {
                options.headers = {};
            }

            options.headers['Authorization'] = token;

            const res = await fetch(`${API_URL}${endpoint}`, options);

            if (res.status === 401 || res.status === 403) {
                logout();
            }

            return res;
        }

        // LIMPIAR FORMULARIO
        function limpiarFormulario() {

            const ids = [
                "nombre",
                "categoria",
                "fecha",
                "cantidad",
                "stock",
                "codigo_barras",
                "marca",
                "sku",
                "proveedor",
                "numero_documento",
                "fecha_elaboracion"
            ];

            ids.forEach(id => {
                document.getElementById(id).value = "";
            });
        }

        // GUARDAR PRODUCTO//
async function guardar() 
{

            const body = {
                nombre: document.getElementById("nombre").value,
                categoria_id: document.getElementById("categoria").value,
                fecha_vencimiento: document.getElementById("fecha").value || null,
                cantidad: parseInt(document.getElementById("cantidad").value) || 0,
                stock_minimo: parseInt(document.getElementById("stock").value) || 0,
                codigo_barras: document.getElementById("codigo_barras").value,
                marca: document.getElementById("marca").value,
                sku: document.getElementById("sku").value,
                proveedor_id: 1,
                numero_documento: document.getElementById("numero_documento").value,
                fecha_elaboracion: document.getElementById("fecha_elaboracion").value || null
            };

            if (!body.nombre || !body.categoria_id || !body.fecha_vencimiento) {

                alert("Por favor completa los campos obligatorios (*)");

                return;
            }

            try {

                const res = await apiFetch('/productos', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(body)
                });

                if (res.ok) {

                    alert("Guardado con éxito");

                    limpiarFormulario();

                    cargarProductos();

                    cargarAlertas();

                } else {

                    alert("Error al guardar");
                }

            } 
            catch (err) 
            {
                console.error(err);
            };
}
    


      // CREAR USUARIO//
async function crearUsuario() {

            const usuario = document.getElementById("nuevoUsuario").value;

            const correo = document.getElementById("nuevoCorreo").value;

            const password = document.getElementById("nuevoPassword").value;

            const rol_id = document.getElementById("nuevoRol").value;

            if (!usuario || !password) {

                alert("Completa usuario y contraseña");

                return;
            }

            try {

                const res = await apiFetch('/usuarios', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        usuario,
                        correo,
                        password,
                        rol_id
                    })
                });

                const data = await res.json();

                if (res.ok) {

                    alert("Usuario creado correctamente");

                    document.getElementById("nuevoUsuario").value = "";
                    document.getElementById("nuevoCorreo").value = "";
                    document.getElementById("nuevoPassword").value = "";

                } else {

                    alert(data.error || "Error al crear usuario");
                }

            } catch (error) {

                console.error(error);

                alert("Error del servidor");
            }
        }

        // CARGAR CATEGORIAS
        async function cargarCategorias() {

            const res = await fetch(`${API_URL}/categorias`);

            const data = await res.json();

            const select = document.getElementById("categoria");

            select.innerHTML = '<option value="">Seleccione...</option>';

            data.forEach(c => {

                select.innerHTML += `
                    <option value="${c.id}">
                        ${c.nombre}
                    </option>
                `;
            });
        }

        // CARGAR PRODUCTOS
        async function cargarProductos() {

            const res = await apiFetch('/productos');

            const data = await res.json();

            const tabla = document.getElementById("tabla");

            tabla.innerHTML = data.map(p => `
                <tr>
                    <td>
                        <strong>${p.nombre}</strong>
                        <small style="color:gray">
                            ${p.marca || ''}
                        </small>
                    </td>

                    <td>
                        ${p.categoria || 'Sin cat.'}
                    </td>

                    <td>
                        ${p.fecha_vencimiento.substring(0, 10)}
                    </td>

                    <td>
                        ${p.cantidad}
                    </td>
                </tr>
            `).join('');

            if (!data.length) {

                tabla.innerHTML = `
                    <tr>
                        <td colspan="4">
                            No hay productos
                        </td>
                    </tr>
                `;
            }
        }

        // CARGAR ALERTAS
        async function cargarAlertas() {

            const res = await apiFetch('/alertas');

            const data = await res.json();

            const div = document.getElementById("alertas");

            div.innerHTML = data.map(p => {

                const hoy = new Date();

                hoy.setHours(0, 0, 0, 0);

                const [anio, mes, dia] =
                    p.fecha_vencimiento.substring(0, 10).split('-');

                const fechaVence =
                    new Date(anio, mes - 1, dia);

                const diasRestantes =
                    Math.round((fechaVence - hoy) / (1000 * 60 * 60 * 24));

                let msg = "";
                let col = "";

                if (diasRestantes < 0) {

                    msg = `${p.nombre} VENCIDO hace ${Math.abs(diasRestantes)} días`;

                    col = "#f8d7da";

                } else if (diasRestantes === 0) {

                    msg = `⚠ ${p.nombre} VENCE HOY`;

                    col = "#fff3cd";

                } else {

                    msg = `${p.nombre} vence en ${diasRestantes} días`;

                    col = "#d1ecf1";
                }

                return `
                    <div class="alerta"
                         style="background:${col}">

                        ${msg}
                    </div>
                `;

            }).join('');

            if (!data.length) {

                div.innerHTML = `
                    <div>
                        Sin alertas
                    </div>
                `;
            }
        }

        // IMPRIMIR ALERTAS
        async function imprimirAlertas() {

            const res = await apiFetch('/alertas');

            const data = await res.json();

            if (!data.length) {

                alert("Nada que imprimir");

                return;
            }

            const filas = data.map(p => `
                <tr>
                    <td>${p.nombre}</td>
                    <td>${p.categoria}</td>
                    <td>${p.fecha_vencimiento.substring(0, 10)}</td>
                    <td>${p.cantidad}</td>
                </tr>
            `).join('');

            const win = window.open('', '_blank');

            win.document.write(`
                <html>

                <head>
                    <style>
                        table {
                            width:100%;
                            border-collapse:collapse;
                        }

                        th,
                        td {
                            border:1px solid #ddd;
                            padding:8px;
                        }
                    </style>
                </head>

                <body>

                    <h1>Reporte de Alertas</h1>

                    <table>

                        <tr>
                            <th>Producto</th>
                            <th>Categoría</th>
                            <th>Vence</th>
                            <th>Stock</th>
                        </tr>

                        ${filas}

                    </table>

                </body>

                </html>
            `);

            win.document.close();

            setTimeout(() => {
                win.print();
            }, 500);
        }

    </script>

</body>

</html>
